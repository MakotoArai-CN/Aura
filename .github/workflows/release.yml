name: Release

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "src-tauri/tauri.conf.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_num: ${{ steps.version.outputs.version_num }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION_NUM=$(node -p "require('./package.json').version")
          VERSION="v${VERSION_NUM}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_num=${VERSION_NUM}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: i686-pc-windows-msvc
            arch: x86
          - target: aarch64-pc-windows-msvc
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          $nsisPath = Join-Path ${env:ProgramFiles(x86)} "NSIS"
          $makensis = Join-Path $nsisPath "makensis.exe"
          if (!(Test-Path $makensis)) {
            throw "NSIS installation failed: makensis.exe not found."
          }
          $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Check frontend
        run: bunx svelte-check

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: error

  build-windows-webview2:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: downloadBootstrapper
            suffix: webview2
          - mode: offlineInstaller
            suffix: webview2-offline
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          $nsisPath = Join-Path ${env:ProgramFiles(x86)} "NSIS"
          $makensis = Join-Path $nsisPath "makensis.exe"
          if (!(Test-Path $makensis)) {
            throw "NSIS installation failed: makensis.exe not found."
          }
          $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Configure WebView2 mode
        shell: pwsh
        run: |
          $conf = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $conf.bundle.windows | Add-Member -NotePropertyName "webviewInstallMode" -NotePropertyValue @{ type = "${{ matrix.mode }}" } -Force
          $conf | ConvertTo-Json -Depth 20 | Set-Content "src-tauri/tauri.conf.json"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles nsis

      - name: Collect WebView2 installer
        shell: pwsh
        run: |
          $artifactDir = "webview2-${{ matrix.suffix }}"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Get-ChildItem "src-tauri/target" -Recurse -File -Filter "*.exe" |
            Where-Object { $_.FullName -like "*\release\bundle\nsis\*" } |
            ForEach-Object {
              Copy-Item $_.FullName -Destination (Join-Path $artifactDir ($_.BaseName + "-${{ matrix.suffix }}" + $_.Extension)) -Force
            }
          if ((Get-ChildItem $artifactDir -File).Count -eq 0) { throw "No WebView2 installer generated." }

      - name: Upload WebView2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.suffix }}
          path: webview2-${{ matrix.suffix }}/*.exe
          if-no-files-found: error

  # === PLACEHOLDER_REST ===

  build-linux:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Configure Linux bundle targets
        run: |
          jq '.bundle.targets = ["deb", "rpm", "appimage"]' src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json src-tauri/tauri.conf.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  build-macos:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x64
          - target: aarch64-apple-darwin
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # === PLACEHOLDER_ANDROID ===

  build-android:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Initialize Android project
        run: bun run tauri:android:init

      - name: Setup Android signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/release.jks
          cat > src-tauri/gen/android/keystore.properties << 'PROPS'
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../release.jks
          PROPS

      - name: Build Android APK
        run: bun run tauri:android:build -- --split-per-abi
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build Universal APK
        run: bun run tauri:android:build
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Collect and rename APKs
        run: |
          mkdir -p android-apks
          find src-tauri/gen/android -path "*/release/*.apk" -type f | while read apk; do
            filename=$(basename "$apk")
            if [[ "$filename" == *"arm64"* ]]; then
              cp "$apk" "android-apks/aura-android-arm64.apk"
            elif [[ "$filename" == *"arm"* ]]; then
              cp "$apk" "android-apks/aura-android-arm.apk"
            elif [[ "$filename" == *"x86_64"* ]]; then
              cp "$apk" "android-apks/aura-android-x86_64.apk"
            elif [[ "$filename" == *"x86"* ]] && [[ "$filename" != *"x86_64"* ]]; then
              cp "$apk" "android-apks/aura-android-x86.apk"
            elif [[ "$filename" == *"universal"* ]] || [[ "$filename" != *"-"* ]]; then
              cp "$apk" "android-apks/aura-android-universal.apk"
            fi
          done
          ls -la android-apks/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: android-apks/*.apk

  # === PLACEHOLDER_RELEASE ===

  release:
    needs: [get-version, build-windows, build-windows-webview2, build-linux, build-macos, build-android]
    if: needs.get-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || echo "No artifacts found"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"- %s (%h)" | head -50)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --oneline --pretty=format:"- %s (%h)")
          fi
          COMMITS=$(echo "$COMMITS" | sed 's/@\([a-zA-Z0-9_-]*\)/`@\1`/g')

          VERSION="${{ needs.get-version.outputs.version }}"
          VERSION_NUM="${{ needs.get-version.outputs.version_num }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          {
            echo "body<<EOF"
            echo "## 更新日志"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            echo "## 下载"
            echo ""
            echo "| 平台 | 说明 |"
            echo "|:-----|:-----|"
            echo "| [Windows x64](${BASE_URL}/Aura_${VERSION_NUM}_x64-setup.exe) | Windows x64 安装包 |"
            echo "| [Windows x86](${BASE_URL}/Aura_${VERSION_NUM}_x86-setup.exe) | Windows x86 安装包 |"
            echo "| [Windows ARM64](${BASE_URL}/Aura_${VERSION_NUM}_arm64-setup.exe) | Windows ARM64 安装包 |"
            echo "| [Windows WebView2](${BASE_URL}/Aura_${VERSION_NUM}_x64-setup-webview2.exe) | Windows WebView2 在线版 |"
            echo "| [Windows 离线](${BASE_URL}/Aura_${VERSION_NUM}_x64-setup-webview2-offline.exe) | Windows WebView2 离线包 |"
            echo "| [macOS Intel](${BASE_URL}/Aura_${VERSION_NUM}_x64.dmg) | macOS Intel |"
            echo "| [macOS Apple Silicon](${BASE_URL}/Aura_${VERSION_NUM}_aarch64.dmg) | macOS Apple Silicon |"
            echo "| [Linux AppImage](${BASE_URL}/Aura_${VERSION_NUM}_amd64.AppImage) | Linux 通用 |"
            echo "| [Linux deb](${BASE_URL}/Aura_${VERSION_NUM}_amd64.deb) | Debian/Ubuntu |"
            echo "| [Linux rpm](${BASE_URL}/Aura_${VERSION_NUM}-1.x86_64.rpm) | Fedora/RHEL |"
            echo "| [Android Universal](${BASE_URL}/aura-android-universal.apk) | Android 通用 |"
            echo "| [Android ARM64](${BASE_URL}/aura-android-arm64.apk) | Android ARM64 |"
            echo "| [Android ARMv7](${BASE_URL}/aura-android-arm.apk) | Android ARMv7 |"
            echo "| [Android x86_64](${BASE_URL}/aura-android-x86_64.apk) | Android x86_64 |"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.version }}
          name: Aura ${{ needs.get-version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
