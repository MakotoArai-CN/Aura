<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura 登录</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, "SF Pro Display", "Segoe UI", "Microsoft YaHei", sans-serif;
        background: #f6f2ea;
        color: #1f2528;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 12%, rgba(54, 132, 116, 0.18), transparent 32rem),
          radial-gradient(circle at 84% 76%, rgba(198, 120, 72, 0.14), transparent 30rem),
          #f6f2ea;
      }

      main {
        width: min(440px, calc(100vw - 40px));
        padding: 28px;
        border: 1px solid rgba(31, 37, 40, 0.1);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 24px 70px rgba(31, 37, 40, 0.16);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 720;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: rgba(31, 37, 40, 0.64);
        line-height: 1.6;
      }

      .bar {
        height: 4px;
        margin: 22px 0;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(31, 37, 40, 0.1);
      }

      .bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #3d8c7b, #d18652);
        animation: loading 1.1s ease-in-out infinite;
      }

      .actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      button {
        height: 36px;
        padding: 0 14px;
        border: 1px solid rgba(31, 37, 40, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        color: inherit;
        font: inherit;
        cursor: pointer;
      }

      button.primary {
        border-color: transparent;
        background: #2f7569;
        color: white;
      }

      @keyframes loading {
        0% {
          transform: translateX(-105%);
        }
        100% {
          transform: translateX(245%);
        }
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #171a1c;
          color: #f6f1e8;
        }

        body {
          background:
            radial-gradient(circle at 20% 12%, rgba(70, 155, 138, 0.2), transparent 32rem),
            radial-gradient(circle at 84% 76%, rgba(209, 134, 82, 0.15), transparent 30rem),
            #171a1c;
        }

        main {
          border-color: rgba(255, 255, 255, 0.12);
          background: rgba(31, 35, 37, 0.76);
        }

        p {
          color: rgba(246, 241, 232, 0.66);
        }

        button {
          border-color: rgba(255, 255, 255, 0.14);
          background: rgba(255, 255, 255, 0.08);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>正在打开登录页</h1>
      <p id="message">请稍候。如果页面没有自动跳转，可以重试或改用浏览器登录。</p>
      <div class="bar" aria-hidden="true"></div>
      <div class="actions">
        <button type="button" id="close">关闭</button>
        <button type="button" id="retry" class="primary">重试</button>
      </div>
    </main>
    <script>
      window.name = "listen1-login";
      const params = new URLSearchParams(location.search);
      const target = params.get("target") || "";
      const message = document.getElementById("message");

      function go() {
        if (!target) {
          message.textContent = "登录地址缺失，请关闭窗口后重试。";
          return;
        }
        location.href = target;
      }

      document.getElementById("retry").addEventListener("click", go);
      document.getElementById("close").addEventListener("click", () => window.close());
      setTimeout(go, 120);
    </script>
  </body>
</html>
